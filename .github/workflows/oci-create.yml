name: OCI Create Instance

on:
#  schedule:
#    - cron: '7,37 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    name: Try to create OCI ARM instance
    permissions:
      contents: write
    steps:
      - name: Random delay (10-150s)
        run: |
          DELAY=$(( RANDOM % 141 + 10 ))
          echo "Waiting ${DELAY} seconds..."
          sleep $DELAY

      - uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Write private key to file
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY_FILENAME }}" > /tmp/oci_private_key.pem
          chmod 600 /tmp/oci_private_key.pem

      - name: Run instance creation script
        run: |
          mkdir -p logs
          LOGFILE="logs/$(date -u +'%Y-%m-%d_%H-%M-%S').log"
          echo "=== OCI Instance Creation Log ==" > $LOGFILE
          echo "Date: $(date -u)" >> $LOGFILE
          echo "" >> $LOGFILE
          php index.php 2>&1 | tee -a $LOGFILE
          echo "LOGFILE=$LOGFILE" >> $GITHUB_ENV
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /tmp/oci_private_key.pem
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_MAX_INSTANCES: ${{ secrets.OCI_MAX_INSTANCES }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          TELEGRAM_BOT_API_KEY: ${{ secrets.TELEGRAM_BOT_API_KEY }}
          CACHE_AVAILABILITY_DOMAINS: 1
          TOO_MANY_REQUESTS_TIME_WAIT: 600

      - name: Commit log file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add logs/
          git diff --cached --quiet || git commit -m "log: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
